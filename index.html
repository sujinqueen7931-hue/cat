<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LED Neon Signboard</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Gaegu:wght@400;700&family=Gowun+Batang:wght@400;700&family=Nanum+Gothic:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(156, 163, 175, 0.5);
      border-radius: 3px;
    }
    
    /* Font styles */
    .font-sans-custom { font-family: 'Nanum Gothic', sans-serif; }
    .font-serif-custom { font-family: 'Gowun Batang', serif; }
    .font-cute-custom { font-family: 'Gaegu', cursive; }
    .font-neon-custom { font-family: 'Black Han Sans', sans-serif; }

    /* Custom Animations for Marquee & Effects */
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
    .animate-blink {
      animation: blink 0.8s infinite;
    }

    /* Fullscreen rotation container styling */
    .landscape-mode {
      transform: rotate(90deg);
      transform-origin: bottom left;
      position: absolute;
      top: -100vw;
      left: 0;
      height: 100vw;
      width: 100vh;
      object-fit: contain;
    }
  </style>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: {
              mint: '#10B981',
              neonMint: '#05FFC4',
              pink: '#F472B6',
              softGray: '#F9FAFB',
              darkBg: '#0F172A',
              darkCard: '#1E293B'
            }
          }
        }
      }
    }
  </script>
</head>
<body class="font-sans-custom bg-brand-softGray text-slate-800 dark:bg-brand-darkBg dark:text-slate-100 transition-colors duration-300 min-h-screen flex flex-col overflow-x-hidden select-none">

  <!-- Main Container -->
  <div id="app" class="flex flex-col h-screen max-w-md mx-auto w-full relative shadow-2xl bg-white dark:bg-brand-darkBg overflow-hidden">
    
    <!-- Top Bar -->
    <header class="flex items-center justify-between px-5 py-4 border-b border-slate-100 dark:border-slate-800 shrink-0 z-10">
      <div class="flex items-center space-x-2">
        <div class="w-8 h-8 rounded-lg bg-gradient-to-tr from-brand-pink to-brand-neonMint flex items-center justify-center text-white">
          <i data-lucide="sparkles" class="w-5 h-5"></i>
        </div>
        <span class="text-lg font-extrabold tracking-tight bg-gradient-to-r from-pink-500 to-emerald-400 bg-clip-text text-transparent">LED GlowSign</span>
      </div>
      
      <!-- Dark mode & Help buttons -->
      <div class="flex items-center space-x-2">
        <button onclick="toggleDarkMode()" class="p-2.5 rounded-full bg-slate-100 dark:bg-slate-800 hover:scale-105 transition-all text-slate-600 dark:text-slate-300" aria-label="다크 모드 전환">
          <i id="theme-icon" data-lucide="moon" class="w-5 h-5"></i>
        </button>
        <button onclick="openHelp()" class="p-2.5 rounded-full bg-slate-100 dark:bg-slate-800 hover:scale-105 transition-all text-slate-600 dark:text-slate-300" aria-label="도움말">
          <i data-lucide="help-circle" class="w-5 h-5"></i>
        </button>
      </div>
    </header>

    <!-- 1. PREVIEW SECTION (Upper 40% on standard screens) -->
    <div class="w-full h-[32%] sm:h-[35%] bg-slate-950 flex flex-col justify-center items-center relative overflow-hidden group border-b border-slate-900 shrink-0">
      <div class="absolute top-2 left-3 flex items-center space-x-1.5 z-10 bg-black/40 px-2.5 py-1 rounded-full backdrop-blur-sm">
        <span class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></span>
        <span class="text-[10px] text-slate-300 font-medium tracking-wider">LIVE PREVIEW</span>
      </div>

      <!-- Preview Display Area -->
      <div id="preview-container" class="w-full h-full flex items-center justify-center overflow-hidden transition-all duration-300 relative">
        <div id="preview-text" class="whitespace-nowrap transition-all duration-100 font-neon-custom select-none">
          응원합니다!
        </div>
      </div>
    </div>

    <!-- 2. CONTROLLER SECTION (Lower 60%) -->
    <div class="flex-1 overflow-y-auto px-5 py-6 space-y-6 pb-24">
      
      <!-- 2.1 TEXT INPUT -->
      <div class="space-y-2">
        <label class="text-xs font-bold uppercase tracking-wider text-slate-400 dark:text-slate-500 flex items-center gap-1">
          <i data-lucide="type" class="w-3.5 h-3.5"></i> 문구 설정
        </label>
        <div class="relative">
          <input 
            type="text" 
            id="input-text" 
            placeholder="응원할 메시지를 입력하세요" 
            value="응원합니다!"
            maxlength="40"
            oninput="updateText(this.value)"
            class="w-full px-4 py-3.5 pr-12 rounded-2xl border border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-100 focus:outline-none focus:ring-2 focus:ring-brand-pink/50 transition-all font-medium"
          >
          <button onclick="clearInput()" class="absolute right-3.5 top-1/2 -translate-y-1/2 p-1.5 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 rounded-full bg-slate-200/50 dark:bg-slate-800/50">
            <i data-lucide="x" class="w-4 h-4"></i>
          </button>
        </div>
      </div>

      <!-- 2.2 FONT STYLE CHIPS -->
      <div class="space-y-2">
        <label class="text-xs font-bold uppercase tracking-wider text-slate-400 dark:text-slate-500 flex items-center gap-1">
          <i data-lucide="font" class="w-3.5 h-3.5"></i> 폰트 스타일
        </label>
        <div class="grid grid-cols-4 gap-2">
          <!-- Gothic -->
          <button 
            id="btn-font-gothic"
            onclick="setFont('font-sans-custom')" 
            class="font-sans-custom py-2.5 px-1 text-center rounded-xl border-2 text-sm font-bold transition-all truncate bg-white dark:bg-slate-800/50 border-slate-100 dark:border-slate-800"
          >
            고딕
          </button>
          <!-- Serif -->
          <button 
            id="btn-font-serif"
            onclick="setFont('font-serif-custom')" 
            class="font-serif-custom py-2.5 px-1 text-center rounded-xl border-2 text-sm font-bold transition-all truncate bg-white dark:bg-slate-800/50 border-slate-100 dark:border-slate-800"
          >
            명조
          </button>
          <!-- Cute -->
          <button 
            id="btn-font-cute"
            onclick="setFont('font-cute-custom')" 
            class="font-cute-custom py-2.5 px-1 text-center rounded-xl border-2 text-base transition-all truncate bg-white dark:bg-slate-800/50 border-slate-100 dark:border-slate-800"
          >
            아기자기
          </button>
          <!-- Neon -->
          <button 
            id="btn-font-neon"
            onclick="setFont('font-neon-custom')" 
            class="font-neon-custom py-2.5 px-1 text-center rounded-xl border-2 text-xs transition-all truncate bg-white dark:bg-slate-800/50 border-slate-100 dark:border-slate-800"
          >
            네온체
          </button>
        </div>
      </div>

      <!-- 2.3 COLOR PALETTES (Text & Background) -->
      <div class="grid grid-cols-2 gap-4">
        <!-- Text Color Picker -->
        <div class="space-y-2">
          <label class="text-xs font-bold uppercase tracking-wider text-slate-400 dark:text-slate-500 flex items-center gap-1">
            <span class="w-2.5 h-2.5 rounded-full bg-brand-pink inline-block"></span> 글자 색상
          </label>
          <div class="relative">
            <div id="text-palette" class="flex flex-wrap gap-2 p-3 bg-slate-50 dark:bg-slate-900 rounded-2xl border border-slate-100 dark:border-slate-800/60 justify-center">
              <!-- JS will inject dynamic circles here -->
            </div>
            <!-- Custom Input Hook -->
            <input type="color" id="text-color-picker" oninput="setTextColor(this.value)" class="absolute opacity-0 pointer-events-none">
            <button onclick="document.getElementById('text-color-picker').click()" class="mt-2 w-full py-1 text-[11px] text-slate-500 dark:text-slate-400 bg-white dark:bg-slate-800 rounded-lg border border-slate-100 dark:border-slate-700/50 flex items-center justify-center gap-1">
              <i data-lucide="pipette" class="w-3 h-3"></i> 직접 선택
            </button>
          </div>
        </div>

        <!-- Background Color Picker -->
        <div class="space-y-2">
          <label class="text-xs font-bold uppercase tracking-wider text-slate-400 dark:text-slate-500 flex items-center gap-1">
            <span class="w-2.5 h-2.5 rounded-full bg-slate-800 dark:bg-white inline-block"></span> 배경 색상
          </label>
          <div class="relative">
            <div id="bg-palette" class="flex flex-wrap gap-2 p-3 bg-slate-50 dark:bg-slate-900 rounded-2xl border border-slate-100 dark:border-slate-800/60 justify-center">
              <!-- JS will inject dynamic circles here -->
            </div>
            <!-- Custom Input Hook -->
            <input type="color" id="bg-color-picker" oninput="setBgColor(this.value)" class="absolute opacity-0 pointer-events-none">
            <button onclick="document.getElementById('bg-color-picker').click()" class="mt-2 w-full py-1 text-[11px] text-slate-500 dark:text-slate-400 bg-white dark:bg-slate-800 rounded-lg border border-slate-100 dark:border-slate-700/50 flex items-center justify-center gap-1">
              <i data-lucide="pipette" class="w-3 h-3"></i> 직접 선택
            </button>
          </div>
        </div>
      </div>

      <!-- 2.4 FONT SIZE ADJUSTMENT -->
      <div class="space-y-3 bg-slate-50 dark:bg-slate-900/60 p-4 rounded-2xl border border-slate-100 dark:border-slate-850">
        <div class="flex justify-between items-center">
          <label class="text-xs font-bold uppercase tracking-wider text-slate-400 dark:text-slate-500 flex items-center gap-1">
            <i data-lucide="maximize" class="w-3.5 h-3.5"></i> 글자 크기
          </label>
          <span id="label-size" class="text-xs font-bold text-brand-pink">48px</span>
        </div>
        <input 
          type="range" 
          id="slider-size" 
          min="20" 
          max="120" 
          value="48" 
          oninput="setFontSize(this.value)"
          class="w-full accent-pink-500 cursor-pointer"
        >
      </div>

      <!-- 2.5 EFFECTS CONFIG -->
      <div class="space-y-4">
        <label class="text-xs font-bold uppercase tracking-wider text-slate-400 dark:text-slate-500 flex items-center gap-1">
          <i data-lucide="zap" class="w-3.5 h-3.5"></i> 글자 효과 (중복 가능)
        </label>
        
        <div class="space-y-3">
          <!-- Flow Speed Switch -->
          <div class="flex flex-col gap-2.5 p-4 bg-slate-50 dark:bg-slate-900/60 rounded-2xl border border-slate-100 dark:border-slate-850">
            <div class="flex justify-between items-center">
              <div class="flex items-center gap-2">
                <input type="checkbox" id="check-flow" onchange="toggleFlow(this.checked)" class="w-4 h-4 accent-pink-500 rounded focus:ring-0">
                <span class="text-sm font-bold text-slate-700 dark:text-slate-300">좌우 흐르는 효과</span>
              </div>
              <span id="label-speed" class="text-xs font-bold text-brand-mint">보통 (10s)</span>
            </div>
            
            <div id="speed-slider-wrapper" class="w-full hidden transition-all duration-300">
              <div class="flex items-center gap-3">
                <span class="text-xs text-slate-400">느림</span>
                <input 
                  type="range" 
                  id="slider-speed" 
                  min="2" 
                  max="25" 
                  value="10" 
                  oninput="setFlowSpeed(this.value)"
                  class="w-full accent-emerald-500 cursor-pointer"
                >
                <span class="text-xs text-slate-400">빠름</span>
              </div>
            </div>
          </div>

          <!-- Blink Effect Switch -->
          <div class="flex items-center justify-between p-4 bg-slate-50 dark:bg-slate-900/60 rounded-2xl border border-slate-100 dark:border-slate-850">
            <span class="text-sm font-bold text-slate-700 dark:text-slate-300 flex items-center gap-2">
              <i data-lucide="eye-off" class="w-4 h-4 text-slate-400"></i> 깜빡이는 효과 (Blink)
            </span>
            <label class="relative inline-flex items-center cursor-pointer">
              <input type="checkbox" id="check-blink" onchange="toggleBlink(this.checked)" class="sr-only peer">
              <div class="w-11 h-6 bg-slate-200 dark:bg-slate-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-emerald-500"></div>
            </label>
          </div>

          <!-- Neon Glow Effect Switch -->
          <div class="flex items-center justify-between p-4 bg-slate-50 dark:bg-slate-900/60 rounded-2xl border border-slate-100 dark:border-slate-850">
            <span class="text-sm font-bold text-slate-700 dark:text-slate-300 flex items-center gap-2">
              <i data-lucide="sun" class="w-4 h-4 text-slate-400"></i> 네온사인 효과 (Neon Glow)
            </span>
            <label class="relative inline-flex items-center cursor-pointer">
              <input type="checkbox" id="check-glow-effect" onchange="toggleGlow(this.checked)" class="sr-only peer" checked>
              <div class="w-11 h-6 bg-slate-200 dark:bg-slate-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-emerald-500"></div>
            </label>
          </div>
        </div>
      </div>
    </div>

    <!-- 3. ACTION FOOTER & FULLSCREEN INITIATOR -->
    <div class="absolute bottom-0 left-0 right-0 p-5 bg-gradient-to-t from-white via-white/95 to-transparent dark:from-brand-darkBg dark:via-brand-darkBg/95 dark:to-transparent shrink-0 z-10">
      <button 
        onclick="enterFullscreen()"
        class="w-full py-4 bg-gradient-to-r from-pink-500 via-rose-500 to-emerald-500 hover:from-pink-600 hover:to-emerald-600 text-white rounded-2xl font-black text-base shadow-xl hover:shadow-2xl hover:scale-[1.02] active:scale-95 transition-all duration-300 flex items-center justify-center space-x-2"
      >
        <i data-lucide="play" class="w-5 h-5 fill-current"></i>
        <span>전화면 시작</span>
      </button>
    </div>

    <!-- 4. FULLSCREEN CANVAS (Immersive Mode Overlays) -->
    <div id="fullscreen-view" class="fixed inset-0 bg-black z-50 hidden flex-col justify-center items-center overflow-hidden">
      <!-- Hidden controls for exiting fullscreen on Tap -->
      <div class="absolute inset-0 z-0 cursor-pointer" onclick="exitFullscreen()"></div>
      
      <!-- Informing Toast (fades out instantly) -->
      <div id="full-screen-toast" class="absolute top-6 px-4 py-2 bg-slate-900/80 text-slate-300 text-xs rounded-full pointer-events-none z-10 border border-slate-800 flex items-center gap-1.5 backdrop-blur-sm transition-opacity duration-700">
        <i data-lucide="info" class="w-3.5 h-3.5 text-brand-pink"></i>
        <span>화면을 한 번 탭하면 설정으로 돌아갑니다.</span>
      </div>

      <!-- Display Text Center -->
      <div id="full-text-container" class="w-full max-w-none flex items-center justify-center overflow-hidden select-none pointer-events-none">
        <div id="full-text" class="whitespace-nowrap transition-all duration-100 font-neon-custom">
          대기중
        </div>
      </div>
    </div>

    <!-- 5. HELPER SHEET / MODAL -->
    <div id="help-modal" class="fixed inset-0 bg-slate-950/60 backdrop-blur-sm z-50 hidden items-center justify-center p-6" onclick="closeHelp()">
      <div class="bg-white dark:bg-brand-darkCard rounded-3xl p-6 max-w-xs w-full shadow-2xl space-y-4 text-center transform transition-all scale-95" onclick="event.stopPropagation()">
        <div class="w-12 h-12 bg-pink-100 dark:bg-pink-900/30 text-brand-pink rounded-full flex items-center justify-center mx-auto">
          <i data-lucide="help-circle" class="w-6 h-6"></i>
        </div>
        <h3 class="text-lg font-bold text-slate-800 dark:text-slate-100">LED 전광판 안내</h3>
        <p class="text-sm text-slate-500 dark:text-slate-400 leading-relaxed text-left">
          • <strong>실시간 미리보기</strong>로 폰트, 색상, 효과를 미리 조율할 수 있습니다.<br>
          • <strong>전화면 시작</strong>을 터치하시면 즉시 가로 모드 응원 전광판이 시작됩니다.<br>
          • 전광판 재생 중 <strong>가볍게 화면을 탭</strong>하면 즉시 설정으로 돌아옵니다.
        </p>
        <button onclick="closeHelp()" class="w-full py-3 bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 text-slate-800 dark:text-slate-200 rounded-xl font-bold transition-all text-sm">
          확인 완료
        </button>
      </div>
    </div>

  </div>

  <script>
    // -----------------------------------------
    // App State Management
    // -----------------------------------------
    const state = {
      text: "응원합니다!",
      fontStyle: "font-neon-custom", // Gothic, Serif, Cute, Neon
      textColor: "#05FFC4",          // Neon Mint Default
      bgColor: "#000000",            // Pitch Black Default
      fontSize: 48,                  // In px for preview
      flowEnabled: false,
      flowSpeed: 10,                 // Translation speed in seconds
      blinkEnabled: false,
      glowEnabled: true,
      isFullscreen: false
    };

    // Palette Templates
    const textColors = ["#05FFC4", "#F472B6", "#3B82F6", "#FBBF24", "#EF4444", "#FFFFFF"];
    const bgColors = ["#000000", "#1E1B4B", "#064E3B", "#4C0519", "#111827", "#312E81"];

    // Dom Elements
    const dom = {
      inputText: document.getElementById('input-text'),
      previewContainer: document.getElementById('preview-container'),
      previewText: document.getElementById('preview-text'),
      fullscreenView: document.getElementById('fullscreen-view'),
      fullTextContainer: document.getElementById('full-text-container'),
      fullText: document.getElementById('full-text'),
      labelSize: document.getElementById('label-size'),
      labelSpeed: document.getElementById('label-speed'),
      speedSliderWrapper: document.getElementById('speed-slider-wrapper'),
      sliderSize: document.getElementById('slider-size'),
      sliderSpeed: document.getElementById('slider-speed'),
      checkFlow: document.getElementById('check-flow'),
      checkBlink: document.getElementById('check-blink'),
      checkGlow: document.getElementById('check-glow-effect'),
      helpModal: document.getElementById('help-modal'),
      toast: document.getElementById('full-screen-toast'),
      // Fix: Added missing element selectors
      textPalette: document.getElementById('text-palette'),
      bgPalette: document.getElementById('bg-palette')
    };

    // -----------------------------------------
    // Event Initializer
    // -----------------------------------------
    window.addEventListener('DOMContentLoaded', () => {
      // Icon Injection
      lucide.createIcons();
      
      // Initialize dynamic palettes
      renderPalettes();
      
      // Sync styles to DOM elements
      applyState();
    });

    // -----------------------------------------
    // Core Functions
    // -----------------------------------------
    function applyState() {
      // 1. Text Update
      const textToRender = state.text.trim() === "" ? "텍스트를 입력해주세요" : state.text;
      dom.previewText.textContent = textToRender;
      dom.fullText.textContent = textToRender;

      // 2. Clear Styles classes
      const fontClasses = ['font-sans-custom', 'font-serif-custom', 'font-cute-custom', 'font-neon-custom'];
      fontClasses.forEach(cls => {
        dom.previewText.classList.remove(cls);
        dom.fullText.classList.remove(cls);
        
        // Unselect styling chip
        const chip = document.getElementById(`btn-font-${cls.split('-')[1]}`);
        if(chip) {
          chip.classList.remove('border-pink-500', 'text-pink-500', 'dark:border-pink-400', 'dark:text-pink-400');
          chip.classList.add('border-slate-100', 'dark:border-slate-800');
        }
      });

      // Apply selected font style
      dom.previewText.classList.add(state.fontStyle);
      dom.fullText.classList.add(state.fontStyle);
      const activeChip = document.getElementById(`btn-font-${state.fontStyle.split('-')[1]}`);
      if(activeChip) {
        activeChip.classList.add('border-pink-500', 'text-pink-500', 'dark:border-pink-400', 'dark:text-pink-400');
        activeChip.classList.remove('border-slate-100', 'dark:border-slate-800');
      }

      // 3. Size syncing
      dom.previewText.style.fontSize = `${state.fontSize}px`;
      dom.labelSize.textContent = `${state.fontSize}px`;
      
      // 4. Color sync (Preview Container & text colors)
      dom.previewContainer.style.backgroundColor = state.bgColor;
      dom.previewText.style.color = state.textColor;

      // 5. FX: Neon Glow Styling
      if (state.glowEnabled) {
        const glowColor = hexToRgb(state.textColor) || "255, 255, 255";
        const textShadow = `0 0 5px rgba(${glowColor}, 0.8), 0 0 15px rgba(${glowColor}, 0.6), 0 0 30px rgba(${glowColor}, 0.4)`;
        dom.previewText.style.textShadow = textShadow;
        dom.fullText.style.textShadow = textShadow;
      } else {
        dom.previewText.style.textShadow = 'none';
        dom.fullText.style.textShadow = 'none';
      }

      // 6. FX: Blink effect integration
      if (state.blinkEnabled) {
        dom.previewText.classList.add('animate-blink');
        dom.fullText.classList.add('animate-blink');
      } else {
        dom.previewText.classList.remove('animate-blink');
        dom.fullText.classList.remove('animate-blink');
      }

      // 7. FX: Flow/Marquee configuration
      handleFlowLayout();
    }

    // Helper: Dynamic Marquee & Scrolling Logic
    let marqueeInterval = null;
    function handleFlowLayout() {
      // Clear dynamic inline styling/animations for Flow
      dom.previewText.style.transform = 'none';
      dom.previewText.style.animation = '';
      dom.fullText.style.transform = 'none';
      dom.fullText.style.animation = '';

      // Clear existing animation styles in document header
      const dynamicStyle = document.getElementById('dynamic-marquee-styles');
      if (dynamicStyle) dynamicStyle.remove();

      if (!state.flowEnabled) {
        // Return text to flex centering if flow disabled
        dom.previewContainer.className = "w-full h-full flex items-center justify-center overflow-hidden transition-all duration-300 relative";
        return;
      }

      // Injecting Dynamic Keyframes & inline animations depending on current speeds and screen widths
      dom.previewContainer.className = "w-full h-full flex items-center justify-start overflow-hidden transition-all duration-300 relative";
      
      const speedInSeconds = state.flowSpeed;
      const uniqueId = `marquee_${Date.now()}`;
      
      // Inline styles injection to keep keyframes precise
      const styleEl = document.createElement('style');
      styleEl.id = 'dynamic-marquee-styles';
      styleEl.innerHTML = `
        @keyframes ${uniqueId} {
          0% { transform: translate3d(100%, 0, 0); }
          100% { transform: translate3d(-100%, 0, 0); }
        }
        .run-marquee {
          animation: ${uniqueId} ${speedInSeconds}s linear infinite !important;
        }
      `;
      document.head.appendChild(styleEl);

      // Add blink fallback simultaneously if selected
      dom.previewText.classList.add('run-marquee');
      dom.fullText.classList.add('run-marquee');
    }

    // -----------------------------------------
    // Palettes Renderers & Custom handlers
    // -----------------------------------------
    function renderPalettes() {
      const textPalette = dom.textPalette;
      const bgPalette = dom.bgPalette;

      textPalette.innerHTML = '';
      bgPalette.innerHTML = '';

      // Text colors render
      textColors.forEach(color => {
        const btn = document.createElement('button');
        btn.onclick = () => setTextColor(color);
        btn.className = `w-7 h-7 rounded-full border border-slate-200 focus:scale-110 active:scale-95 transition-all`;
        btn.style.backgroundColor = color;
        // Marker if active
        if (state.textColor.toUpperCase() === color.toUpperCase()) {
          btn.innerHTML = `<i data-lucide="check" class="w-4 h-4 text-black mx-auto"></i>`;
        }
        textPalette.appendChild(btn);
      });

      // Background colors render
      bgColors.forEach(color => {
        const btn = document.createElement('button');
        btn.onclick = () => setBgColor(color);
        btn.className = `w-7 h-7 rounded-full border border-slate-200 focus:scale-110 active:scale-95 transition-all`;
        btn.style.backgroundColor = color;
        // Marker if active
        if (state.bgColor.toUpperCase() === color.toUpperCase()) {
          btn.innerHTML = `<i data-lucide="check" class="w-4 h-4 text-white mx-auto flex items-center justify-center"></i>`;
        }
        bgPalette.appendChild(btn);
      });

      // Re-create lucide icons for elements created
      lucide.createIcons();
    }

    // Hex Color to RGB converter for CSS custom shadow variables
    function hexToRgb(hex) {
      const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
      return result ? `${parseInt(result[1], 16)}, ${parseInt(result[2], 16)}, ${parseInt(result[3], 16)}` : null;
    }

    // -----------------------------------------
    // Setters / Event Handlers
    // -----------------------------------------
    function updateText(val) {
      state.text = val;
      applyState();
    }

    function clearInput() {
      dom.inputText.value = "";
      state.text = "";
      applyState();
    }

    fontClasses = ['font-sans-custom', 'font-serif-custom', 'font-cute-custom', 'font-neon-custom'];
    function setFont(fontClass) {
      state.fontStyle = fontClass;
      applyState();
    }

    function setTextColor(color) {
      state.textColor = color;
      renderPalettes();
      applyState();
    }

    function setBgColor(color) {
      state.bgColor = color;
      renderPalettes();
      applyState();
    }

    function setFontSize(val) {
      state.fontSize = parseInt(val);
      applyState();
    }

    function toggleFlow(checked) {
      state.flowEnabled = checked;
      if (checked) {
        dom.speedSliderWrapper.style.display = 'block';
      } else {
        dom.speedSliderWrapper.style.display = 'none';
      }
      applyState();
    }

    function setFlowSpeed(val) {
      // Slider value maps directly to translate animation duration (seconds).
      // Higher speed value (slider) -> smaller duration (seconds) -> faster movement.
      // So let's flip: duration = (max_range + min_range) - slider_val
      const mappedSpeed = 27 - parseInt(val); 
      state.flowSpeed = mappedSpeed;

      let speedText = "보통";
      if (mappedSpeed < 8) speedText = "매우 빠름";
      else if (mappedSpeed < 12) speedText = "빠름";
      else if (mappedSpeed < 18) speedText = "보통";
      else speedText = "느림";

      dom.labelSpeed.textContent = `${speedText} (${mappedSpeed}초)`;
      applyState();
    }

    function toggleBlink(checked) {
      state.blinkEnabled = checked;
      applyState();
    }

    function toggleGlow(checked) {
      state.glowEnabled = checked;
      applyState();
    }

    // -----------------------------------------
    // Fullscreen View Mode Handling
    // -----------------------------------------
    function enterFullscreen() {
      state.isFullscreen = true;
      
      // Update full view styling and attributes dynamically
      dom.fullscreenView.style.backgroundColor = state.bgColor;
      dom.fullscreenView.classList.remove('hidden');
      dom.fullscreenView.classList.add('flex');

      // Sync font styling dynamically based on container size
      dom.fullText.style.color = state.textColor;
      
      // Set the font sizing automatically for horizontal orientation
      const scaleMultiplier = window.innerWidth > window.innerHeight ? 1.5 : 1.0;
      dom.fullText.style.fontSize = `${state.fontSize * scaleMultiplier * 1.5}px`;

      // Keep toast active briefly, then fade out
      dom.toast.style.opacity = '1';
      setTimeout(() => {
        dom.toast.style.opacity = '0';
      }, 3500);

      // Attempt standard Fullscreen API for actual full screen device experience
      try {
        const docEl = document.documentElement;
        if (docEl.requestFullscreen) {
          docEl.requestFullscreen().catch(err => {
            console.log("Full Screen request rejected: ", err);
          });
        }
      } catch (err) {
        console.log("Fullscreen request failed inline: ", err);
      }

      // Rotate layout for true Landscape feel if on typical portrait aspect ratio
      if (window.innerHeight > window.innerWidth) {
        dom.fullscreenView.classList.add('landscape-mode');
      }

      applyState();
    }

    function exitFullscreen() {
      state.isFullscreen = false;
      dom.fullscreenView.classList.add('hidden');
      dom.fullscreenView.classList.remove('flex', 'landscape-mode');

      // Safe check to avoid "Document not active" error in active iframe or background views
      try {
        if (document.fullscreenElement && document.exitFullscreen) {
          document.exitFullscreen().catch(err => {
            console.warn("Fullscreen exit rejected or document inactive:", err);
          });
        }
      } catch (err) {
        console.warn("Synchronous error during fullscreen exit:", err);
      }
      
      applyState();
    }

    // Listen to changes like Esc key or physical device exits
    document.addEventListener('fullscreenchange', () => {
      if (!document.fullscreenElement && state.isFullscreen) {
        exitFullscreen();
      }
    });

    // -----------------------------------------
    // Helper Modals
    // -----------------------------------------
    function openHelp() {
      const modal = dom.helpModal;
      modal.classList.remove('hidden');
      modal.classList.add('flex');
    }

    function closeHelp() {
      const modal = dom.helpModal;
      modal.classList.add('hidden');
      modal.classList.remove('flex');
    }

    // -----------------------------------------
    // Dark / Light Mode handler
    // -----------------------------------------
    function toggleDarkMode() {
      const isDark = document.documentElement.classList.toggle('dark');
      const icon = document.getElementById('theme-icon');
      if (isDark) {
        icon.setAttribute('data-lucide', 'sun');
      } else {
        icon.setAttribute('data-lucide', 'moon');
      }
      lucide.createIcons();
    }
  </script>
</body>
</html>
